const { useState, useRef, useEffect } = React;

// ─── CARDS ───────────────────────────────────────────────
const SUITS = ["♠", "♥", "♦", "♣"];
const FACE = { 11: "J", 12: "Q", 13: "K", 14: "A" };
const rName = r => FACE[r] || String(r);
const isRed = s => s === "♥" || s === "♦";

// Card ids must be unique across BOTH players' decks: destruction removes
// victims by id from both boards, so a shared id would smash your own card.
let CARD_ID = 0;
function makeDeck() {
  const d = [];
  for (const s of SUITS) for (let r = 2; r <= 14; r++) d.push({ r, s, id: CARD_ID++ });
  for (let i = d.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [d[i], d[j]] = [d[j], d[i]];
  }
  return d;
}

// ─── HAND EVALUATION (3-card poker) ──────────────────────
// Column score = sum of card values (A=14) × hand multiplier.
// 3-card ranking: straight flush > trips > straight > flush > pair.
const MULT_TABLE = [
  ["Pair", 2], ["Flush", 3], ["Straight", 4],
  ["Three of a Kind", 6], ["Straight Flush", 12],
];

function evalHand(cards) {
  const n = cards.length;
  const sum = cards.reduce((a, c) => a + c.r, 0);
  if (!n) return { name: "", m: 0, score: 0 };
  const counts = {};
  cards.forEach(c => { counts[c.r] = (counts[c.r] || 0) + 1; });
  const cv = Object.values(counts).sort((a, b) => b - a);
  const flush = n === 3 && cards.every(c => c.s === cards[0].s);
  let straight = false;
  if (n === 3 && cv[0] === 1) {
    const rs = cards.map(c => c.r).sort((a, b) => a - b);
    straight = rs[2] - rs[0] === 2 || (rs[0] === 2 && rs[1] === 3 && rs[2] === 14);
  }
  let name = "HIGH", m = 1;
  if (straight && flush) { name = "ST.FLUSH"; m = 12; }
  else if (cv[0] === 3)  { name = "TRIPS";    m = 6; }
  else if (straight)     { name = "STR8";     m = 4; }
  else if (flush)        { name = "FLUSH";    m = 3; }
  else if (cv[0] === 2)  { name = "PAIR";     m = 2; }
  return { name, m, score: sum * m };
}

const boardTotal = board => board.reduce((a, col) => a + evalHand(col).score, 0);

// ─── DEALER AI: expectimax ───────────────────────────────
// The dealer searches the game tree: it tries each placement, then averages
// over every card the opponent could draw next (their real remaining deck),
// assuming the opponent answers with its own best move, and so on to a fixed
// depth. No randomness, so the house edge stays a fixed, measurable quantity.
// Leaf positions are scored by a phase-aware evaluation (see leafEval): early
// game it rewards live draws toward multipliers, late game it penalises exposed
// stacks the opponent can still smash. No randomness, so the house edge stays a
// fixed, measurable quantity.
const AI_DEPTH = 3; // plies of lookahead (each ply = one card placed)

function colPotential(col) {
  if (col.length !== 2) return 0;
  let b = 0;
  if (col[0].s === col[1].s) b += 3.5; // flush draw alive
  const d = Math.abs(col[0].r - col[1].r);
  if (d > 0 && d <= 2) b += 2.5; // straight draw alive
  else if (Math.max(col[0].r, col[1].r) === 14 && Math.min(col[0].r, col[1].r) <= 3) b += 2.5; // wheel draw
  return b;
}

// Apply `card` to `boards[side][col]`, destroying same-rank cards in the
// opponent's opposing column. Returns a fresh boards object.
function applyPlace(boards, side, col, card) {
  const opp = side === "a" ? "p" : "a";
  const nb = { p: boards.p.map(c => c.slice()), a: boards.a.map(c => c.slice()) };
  nb[side][col] = [...nb[side][col], card];
  nb[opp][col] = nb[opp][col].filter(c => c.r !== card.r);
  return nb;
}

const boardFull = (boards, side) => boards[side].every(c => c.length === 3);

// Value lost if the opponent smashes a column's most damaging duplicate rank —
// i.e. how much exposed multiplier value sits in that column.
function smashRisk(col) {
  if (col.length < 2) return 0;
  const base = evalHand(col).score, cnt = {};
  col.forEach(c => { cnt[c.r] = (cnt[c.r] || 0) + 1; });
  let worst = 0;
  for (const r in cnt) {
    const loss = base - evalHand(col.filter(c => +c.r !== +r)).score;
    if (loss > worst) worst = loss;
  }
  return worst;
}

// Value of a position from the dealer's ("a") perspective: positive = good for
// the dealer. Phase-aware: early game rewards live draw potential; late game
// penalises exposed multiplier value the opponent can still smash. A card sitting
// opposite a FULL column is safe (can't be matched), so it incurs no risk.
function leafEval(boards) {
  let aS = 0, pS = 0, aP = 0, pP = 0, filled = 0;
  for (let c = 0; c < 3; c++) {
    aS += evalHand(boards.a[c]).score; pS += evalHand(boards.p[c]).score;
    aP += colPotential(boards.a[c]);   pP += colPotential(boards.p[c]);
    filled += boards.a[c].length + boards.p[c].length;
  }
  const prog = filled / 18; // 0 (empty) → 1 (both boards full)
  let aExp = 0, pExp = 0;
  for (let c = 0; c < 3; c++) {
    if (boards.p[c].length < 3) aExp += smashRisk(boards.a[c]);
    if (boards.a[c].length < 3) pExp += smashRisk(boards.p[c]);
  }
  return (aS - pS) + (1 - prog) * 0.6 * (aP - pP) - prog * 0.4 * (aExp - pExp);
}

// `side` has drawn `card` and must place it; search `depth` plies. Dealer
// maximises, opponent minimises, draws are chance nodes averaged uniformly
// over the drawing side's remaining deck.
function searchPlace(boards, decks, side, card, depth) {
  const opp = side === "a" ? "p" : "a";
  let best = side === "a" ? -Infinity : Infinity, any = false;
  for (let col = 0; col < 3; col++) {
    if (boards[side][col].length >= 3) continue;
    any = true;
    const nb = applyPlace(boards, side, col, card);
    let v;
    if (depth <= 1 || boardFull(nb, "a") || boardFull(nb, "p")) {
      v = leafEval(nb);
    } else {
      const od = decks[opp];
      if (!od.length) { v = leafEval(nb); }
      else {
        let sum = 0;
        for (const dc of od) sum += searchPlace(nb, decks, opp, dc, depth - 1);
        v = sum / od.length;
      }
    }
    if (side === "a") { if (v > best) best = v; }
    else { if (v < best) best = v; }
  }
  return any ? best : leafEval(boards);
}

function aiChoose(g) {
  const { drawn: card, boards, decks } = g;
  let best = -1, bestVal = -Infinity;
  for (let col = 0; col < 3; col++) {
    if (boards.a[col].length >= 3) continue;
    const nb = applyPlace(boards, "a", col, card);
    let v;
    if (AI_DEPTH <= 1 || boardFull(nb, "a") || boardFull(nb, "p") || !decks.p.length) {
      v = leafEval(nb);
    } else {
      let sum = 0;
      for (const dc of decks.p) sum += searchPlace(nb, decks, "p", dc, AI_DEPTH - 1);
      v = sum / decks.p.length;
    }
    if (v > bestVal) { bestVal = v; best = col; } // ties break to lower column
  }
  return best;
}

// ─── SOUND ───────────────────────────────────────────────
let actx = null;
function beep(freq, dur, type = "sine", gain = 0.08) {
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), gn = actx.createGain();
    o.type = type; o.frequency.value = freq;
    gn.gain.setValueAtTime(gain, actx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(gn); gn.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch (e) {}
}

// ─── APP ─────────────────────────────────────────────────
function App() {
  const [bank, setBank] = useState(() => {
    const v = parseFloat(localStorage.getItem("pokerbones_bank"));
    return isFinite(v) ? v : START_BANK;
  });
  const [bet, setBet] = useState(10);
  const [phase, setPhase] = useState("bet"); // bet | play | over
  const [g, _setG] = useState(null);
  const gRef = useRef(null);
  const setG = ng => { gRef.current = ng; _setG(ng); };
  const [busy, setBusy] = useState(false);
  const busyRef = useRef(false);
  const setBusy2 = b => { busyRef.current = b; setBusy(b); };
  const [result, setResult] = useState(null);
  const [handFx, setHandFx] = useState(null);
  const HAND_TIER = { 2: 1, 3: 2, 4: 3, 6: 4, 12: 5 };
  const [showRules, setShowRules] = useState(false);
  const [deckView, setDeckView] = useState(null); // "p" | "a" | null
  const [celebrate, setCelebrate] = useState(null); // win celebration overlay payload
  const [attack, setAttack] = useState(null);       // {attackerId, victims, phase} staged destruction
  const [shakeLv, setShakeLv] = useState(0);         // screen-shake intensity (0–3, scales with kills)
  const [killStreak, setKillStreak] = useState(null);// kill banner (disabled for now)
  const [handBreakFx, setHandBreakFx] = useState(null); // {col,name,m} — the broken dealer hand, shown shattering
  const [pulse, setPulse] = useState(null);          // card id to play the placement "thunk" bounce
  const [showSettings, setShowSettings] = useState(false);
  const pDeckRef = useRef(null);
  const aDeckRef = useRef(null);
  const bankRef = useRef(null);
  const placeFromRef = useRef(null); // {id, rect} so a placed card flies from the draw slot
  const timeouts = useRef([]);
  const later = (fn, ms) => timeouts.current.push(setTimeout(fn, ms));
  useEffect(() => () => timeouts.current.forEach(clearTimeout), []);
  useEffect(() => { localStorage.setItem("pokerbones_bank", String(bank)); }, [bank]);

  function deal(b) {
    if (b < 1 || b > bank) return;
    setBank(v => +(v - b).toFixed(2));
    const decks = { p: makeDeck(), a: makeDeck() };
    const starter = "p"; // player always acts first (RTP balanced via payout, see COMMISSION)
    const drawn = decks[starter].pop();
    setG({ decks, drawn, turn: starter, boards: { p: [[], [], []], a: [[], [], []] }, dying: [], bet: b });
    setResult(null);
    setHandFx(null);
    setCelebrate(null);
    setAttack(null);
    placeFromRef.current = null;
    setPhase("play");
    setBusy2(false);
  }

  function aiMove() {
    const gg = gRef.current;
    if (!gg || !gg.drawn || gg.turn !== "a") return;
    place("a", aiChoose(gg));
  }

  function onColTap(col) {
    const gg = gRef.current;
    if (!gg || busyRef.current || gg.turn !== "p" || !gg.drawn) return;
    if (gg.boards.p[col].length >= 3) return;
    place("p", col);
  }

  function place(side, col) {
    const gg = gRef.current;
    const card = gg.drawn;
    const opp = side === "p" ? "a" : "p";
    const boards = { p: gg.boards.p.map(c => [...c]), a: gg.boards.a.map(c => [...c]) };
    const prevM = evalHand(gg.boards[side][col]).m;
    boards[side][col] = [...boards[side][col], { ...card }];
    const newEv = evalHand(boards[side][col]);
    const victims = boards[opp][col].filter(c => c.r === card.r).map(c => c.id);
    // HAND BREAK: the player destroys cards out of a dealer column that held a
    // real hand (pair or better). Capture that hand so we can show it shattering.
    const oppEvBefore = evalHand(gg.boards[opp][col]);
    const brokenHand = (side === "p" && victims.length > 0 && oppEvBefore.m > 1)
      ? { col, name: oppEvBefore.name, m: oppEvBefore.m, tier: HAND_TIER[oppEvBefore.m] || 1 } : null;
    // capture where the drawn card sits now, so the placed card flies there.
    const drawEl = document.querySelector(".drawfly");
    placeFromRef.current = drawEl ? { id: card.id, rect: drawEl.getBoundingClientRect() } : null;
    setBusy2(true);
    setG({ ...gg, drawn: null, boards, dying: [] });

    // ── deferred placement payoff (runs only AFTER the attack + hand break) ──
    const playPlacement = () => {
      sPlace();
      setPulse(card.id);
      later(() => setPulse(p => (p === card.id ? null : p)), 320);
    };
    const showFormedHand = () => {
      if (!(newEv.m > prevM && HAND_TIER[newEv.m])) return;
      const tier = HAND_TIER[newEv.m];
      setHandFx({ side, col, name: newEv.name, m: newEv.m, tier });
      (side === "p" ? sHand : sHandNeutral)(newEv.m);  // chimes scale with the multiplier
      later(() => setHandFx(fx => (fx && fx.side === side && fx.col === col ? null : fx)), 1700);
    };
    const removeVictims = () => {
      const g2 = gRef.current;
      const nb = {
        p: g2.boards.p.map(cl => cl.filter(c => !victims.includes(c.id))),
        a: g2.boards.a.map(cl => cl.filter(c => !victims.includes(c.id))),
      };
      setG({ ...g2, boards: nb, dying: [] });
    };
    const finishTurn = () => {
      const g2 = gRef.current;
      const full = s => g2.boards[s].every(cl => cl.length === 3);
      if (full("p") || full("a") || g2.decks[opp].length === 0) { endGame(g2.boards); return; }
      const decks = { p: [...g2.decks.p], a: [...g2.decks.a] };
      const drawn = decks[opp].pop();
      setG({ ...g2, dying: [], decks, drawn, turn: opp });
      setBusy2(false);
      if (opp === "a") later(aiMove, 1500);
    };
    const settle = () => { playPlacement(); showFormedHand(); finishTurn(); };

    if (victims.length) {
      // 1) the attack is the ONLY thing that happens at first
      runAttack(side, card.id, victims, () => {
        // 2) after the defenders rip, clear them, then the placement payoff
        removeVictims();
        // HAND BREAK shatter VFX/SFX disabled for now:
        // if (brokenHand) {
        //   setHandBreakFx(brokenHand);            // hand callout over defenders → shatters
        //   later(() => setHandBreakFx(null), 820);
        //   later(settle, 880);                    // 3) finally, the placement payoff
        // } else {
        //   settle();
        // }
        settle();
      });
    } else {
      later(() => { playPlacement(); showFormedHand(); }, 230);
      later(finishTurn, 360);
    }
  }

  // Staged destruction sequence (charge → rip). Only bystander cards dim; the
  // attacker charges + shakes, the victims tear in half, with a screen-shake
  // scaled by the number destroyed. This is the ONLY thing that runs on
  // placement; HAND BREAK + placement payoff follow in place().
  function runAttack(side, attackerId, victims, done) {
    const n = victims.length;
    later(() => {
      setAttack({ attackerId, victims, phase: "burn" });
      // sBurn();  // fire SFX disabled for now — attacks use the rip only
      if (side === "p") sAttackGood();            // positive flourish on the player's attack
      setShakeLv(Math.min(3, n));                 // screen shake, harder per kill
      later(() => setShakeLv(0), 430);
      // NOTE: DOUBLE/TRIPLE KILL banners + VO are disabled for now (see place()).
      // (n >= 2) ? (n >= 3 ? sTripleKill : sDoubleKill)() : null;
    }, 340);                                       // let the placed card land first
    later(() => { setAttack(a => (a ? { ...a, phase: "rip" } : a)); sRip(); }, 490);  // tear
    later(() => { setAttack(null); done(); }, 980);
  }

  function endGame(boards) {
    const g2 = gRef.current;
    const pT = boardTotal(boards.p), aT = boardTotal(boards.a);
    setG({ ...g2, boards, dying: [], drawn: null });
    later(() => {
      const b = g2.bet;
      let outcome, ret, profit;
      if (pT > aT)      { outcome = "win";  ret = b * (2 - COMMISSION); profit = b * (1 - COMMISSION); }
      else if (pT < aT) { outcome = "lose"; ret = 0;                    profit = -b; }
      else              { outcome = "push"; ret = b;                    profit = 0; }
      setResult({ outcome, pT, aT, profit, ret: +ret.toFixed(2) });
      setBusy2(false);
      if (outcome === "win") {
        // Big celebration OVER the board first; the coin drain credits the
        // bank, then the summary panel slides in (see WinCelebration).
        setCelebrate({ ret: +ret.toFixed(2), profit: +profit.toFixed(2) });
      } else {
        if (ret) setBank(v => +(v + ret).toFixed(2));
        setPhase("over");
        if (outcome === "lose") sLose();
      }
    }, 900);
  }

  // Called by the celebration once the coins finish draining into the bank.
  function finishCelebration() {
    setCelebrate(null);
    setPhase("over");
  }

  function resetBank() { setBank(START_BANK); setBet(10); }

  // Debug tool (settings menu): override the player's current draw card.
  function overrideDraw(r, s) {
    const gg = gRef.current;
    if (!gg || !gg.drawn || gg.turn !== "p") return;
    setG({ ...gg, drawn: { ...gg.drawn, r, s } });
  }

  // Debug tool: drop a chosen card straight into a dealer grid column.
  function addDealerCard(r, s, col) {
    const gg = gRef.current;
    if (!gg || gg.boards.a[col].length >= 3) return;
    const boards = { p: gg.boards.p.map(c => [...c]), a: gg.boards.a.map(c => [...c]) };
    boards.a[col] = [...boards.a[col], { r, s, id: CARD_ID++ }];
    setG({ ...gg, boards });
  }

  const boards = g ? g.boards : EMPTY_BOARDS;
  const dying = g ? g.dying : [];
  const playerTurn = phase === "play" && g && g.turn === "p" && g.drawn && !busy;
  const live = cards => cards.filter(c => !dying.includes(c.id));
  const aTotal = boardTotal(boards.a.map(live));
  const pTotal = boardTotal(boards.p.map(live));

  const aWinning = aTotal > pTotal, pWinning = pTotal > aTotal;
  const stake = g && phase === "play" ? g.bet : bet;
  const roleOf = id => !attack ? null
    : (attack.attackerId === id ? "attacker" : (attack.victims.includes(id) ? "victim" : "bystander"));
  const renderCard = (card, key) => card
    ? <CardV key={card.id} c={card} dying={dying.includes(card.id)}
        flyFrom={placeFromRef.current && placeFromRef.current.id === card.id ? placeFromRef.current.rect : null}
        role={roleOf(card.id)} phase={attack ? attack.phase : null} pulsing={pulse === card.id} />
    : <div key={key} className="slot" />;
  const drawSlot = side => (g && g.drawn && g.turn === side)
    ? <DrawnCard key={g.drawn.id} c={g.drawn} deckRef={side === "a" ? aDeckRef : pDeckRef} side={side} />
    : <div className="slot draw" />;
  const cols = [0, 1, 2].map(c => ({
    c, aCards: boards.a[c], pCards: boards.p[c],
    aEv: evalHand(live(boards.a[c])), pEv: evalHand(live(boards.p[c])),
    tappable: playerTurn && boards.p[c].length < 3,
    aFx: handFx && handFx.side === "a" && handFx.col === c,
    pFx: handFx && handFx.side === "p" && handFx.col === c,
  }));
  return (
    <div className={"app" + (handFx && handFx.tier >= 4 ? " shake" : "")}
      style={{ "--card-back": "url(" + CARD_BACK + ")" }}>
      <header className="top">
        <span className="logo">POKER<em>BONES</em></span>
        <button className="info gear" onClick={() => setShowSettings(true)} aria-label="Settings">⚙</button>
        <button className="info" onClick={() => setShowRules(true)}>?</button>
        <span className="bank" ref={bankRef}>{fmt(bank)}</span>
      </header>

      <div className={"board" + (shakeLv ? " atkshake a" + shakeLv : "")}>
        {/* row 1 — dealer scores (rail + 3 columns) */}
        <div className="railcell railscore">
          <Label cls="en" owner="DEALER'S" noun="SCORE" vertical />
          <ScoreTotal side="en" total={aTotal} winning={aWinning} />
        </div>
        {cols.map(C => (
          <div key={"es" + C.c} className={"colscore en" + (C.aEv.score > C.pEv.score ? " lead" : "")}>
            <b>{C.aEv.score || 0}</b>
            <span>{C.aEv.name ? C.aEv.name + " ×" + C.aEv.m : "—"}</span>
          </div>
        ))}

        {/* row 2 — dealer deck/draw + cards */}
        <div className="railcell railcards en">
          <div className="rdd">
            <DeckPile side="a" count={g ? g.decks.a.length : 52} deckRef={aDeckRef}
              drew={g && g.drawn && g.turn === "a"}
              idkey={g && g.drawn && g.turn === "a" ? "da" + g.drawn.id : "aidle"}
              onClick={g ? () => setDeckView("a") : undefined} />
            <div className="drawhold"><Label cls="en" owner="DEALER'S" noun="DRAW" />{drawSlot("a")}</div>
          </div>
        </div>
        {cols.map(C => {
          const hit = C.aCards.some(x => dying.includes(x.id));
          return (
            <div key={"ah" + C.c} className={"half dealer" + (hit ? " hit" : "") + (C.aFx ? " glow t" + handFx.tier : "")}>
              {[2, 1, 0].map(j => renderCard(C.aCards[j], "e" + j))}
              {C.aFx && <div className={"handpop t" + handFx.tier}>{handFx.name} ×{handFx.m}</div>}
              {/* HAND BREAK shatter disabled for now:
              {handBreakFx && handBreakFx.col === C.c &&
                <HandBreakPop key={"hb" + handBreakFx.name + handBreakFx.m} name={handBreakFx.name} m={handBreakFx.m} tier={handBreakFx.tier} />}
              */}
            </div>
          );
        })}

        {/* row 3 — column letters */}
        <div className="railcell railmid" />
        {cols.map(C => <div key={"m" + C.c} className="colmid">{COL_LETTERS[C.c]}</div>)}

        {/* row 4 — player deck/draw + cards */}
        <div className="railcell railcards you">
          <div className="rdd">
            <div className="drawhold"><Label cls="you" owner="YOUR" noun="DRAW" />{drawSlot("p")}</div>
            <DeckPile side="p" count={g ? g.decks.p.length : 52} deckRef={pDeckRef}
              drew={g && g.drawn && g.turn === "p"}
              idkey={g && g.drawn && g.turn === "p" ? "dp" + g.drawn.id : "pidle"}
              onClick={g ? () => setDeckView("p") : undefined} />
          </div>
        </div>
        {cols.map(C => {
          const hit = C.pCards.some(x => dying.includes(x.id));
          return (
            <div key={"ph" + C.c}
              className={"half mine" + (C.tappable ? " tappable" : "") + (hit ? " hit" : "") + (C.pFx ? " glow t" + handFx.tier : "")}
              onClick={C.tappable ? () => onColTap(C.c) : undefined}>
              {[0, 1, 2].map(j => renderCard(C.pCards[j], "e" + j))}
              {C.pFx && <div className={"handpop t" + handFx.tier}>{handFx.name} ×{handFx.m}</div>}
            </div>
          );
        })}

        {/* row 5 — player scores */}
        <div className="railcell railscore">
          <Label cls="you" owner="YOUR" noun="SCORE" vertical />
          <ScoreTotal side="you" total={pTotal} winning={pWinning} />
        </div>
        {cols.map(C => (
          <div key={"ps" + C.c} className={"colscore you" + (C.pEv.score > C.aEv.score ? " lead" : "")}>
            <b>{C.pEv.score || 0}</b>
            <span>{C.pEv.name ? C.pEv.name + " ×" + C.pEv.m : "—"}</span>
          </div>
        ))}
      </div>

      <div className="botbar">
        <div className="botbox bet">
          <span className="botlabel">BET</span>
          <b>{fmt(stake)}</b>
        </div>
        <div className={"tapbanner" + (playerTurn ? " mine" : "")}>
          {phase !== "play" ? "PLACE YOUR BET"
            : playerTurn ? "YOUR DRAW — TAP A COLUMN"
            : "DEALER'S TURN…"}
        </div>
        <div className="botbox payout">
          <span className="botlabel gold">PAYOUT</span>
          <b>{fmt(stake * (2 - COMMISSION))}</b>
        </div>
      </div>

      {phase === "bet" && (
        <div className="overlay">
          <div className="panel betpanel">
            <h1>POKER<em>BONES</em></h1>
            <p className="tag">Stack poker hands. Smash the dealer's. Take the pot.</p>
            <div className="bankline">BALANCE <b>{fmt(bank)}</b></div>
            {bank >= 1 ? (
              <React.Fragment>
                <div className="slip">
                  <div className="slipcol">
                    <span>STAKE</span>
                    <b>{fmt(bet)}</b>
                  </div>
                  <div className="sliparrow">▸</div>
                  <div className="slipcol win">
                    <span>PAYOUT</span>
                    <b>{fmt(bet * (2 - COMMISSION))}</b>
                  </div>
                </div>
                <div className="winchance">WIN CHANCE <b>54%</b> · you act first</div>
                <div className="chips">
                  {CHIPS.map(c => (
                    <button key={c} className="chip" disabled={bet + c > bank}
                      onClick={() => { setBet(b => b + c); sFlip(); }}>+{c}</button>
                  ))}
                  <button className="chip clearchip" disabled={!bet}
                    onClick={() => setBet(0)}>C</button>
                </div>
                <button className="dealbtn" disabled={bet < 1 || bet > bank}
                  onClick={() => deal(bet)}>PLACE BET — {fmt(bet)}</button>
                <p className="fine">Wins pay 0.82 : 1 · ties push</p>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <p className="broke">You're busted.</p>
                <button className="dealbtn" onClick={resetBank}>STAKE ME +{fmt(START_BANK)}</button>
              </React.Fragment>
            )}
            <button className="ruleslink" onClick={() => setShowRules(true)}>HOW TO PLAY</button>
          </div>
        </div>
      )}

      {phase === "over" && result && (
        <div className="overlay dim">
          <div className={"panel result " + result.outcome}>
            <h2>{result.outcome === "win" ? "YOU WIN" : result.outcome === "lose" ? "DEALER WINS" : "PUSH"}</h2>
            <div className="totals">
              <span>YOU <b>{result.pT}</b></span>
              <span className="vs">vs</span>
              <span>DEALER <b>{result.aT}</b></span>
            </div>
            <div className="profit">
              {result.profit > 0 ? "+" : ""}{fmt(result.profit)}
            </div>
            <button className="dealbtn" disabled={bet < 1 || bet > bank}
              onClick={() => deal(bet)}>PLAY AGAIN — {fmt(bet)}</button>
            <button className="ruleslink" onClick={() => setPhase("bet")}>CHANGE BET</button>
          </div>
        </div>
      )}

      {showSettings && (
        <SettingsPanel g={g} onSetDraw={overrideDraw} onAddDealer={addDealerCard} onClose={() => setShowSettings(false)} />
      )}

      {showRules && (
        <div className="overlay dim" onClick={() => setShowRules(false)}>
          <div className="panel rules" onClick={e => e.stopPropagation()}>
            <h2>HOW TO PLAY</h2>
            <p>You and the dealer each draw from your own 52-card deck and take
            turns. On your turn, a card is drawn — tap one of your three columns
            to place it. Each column faces the dealer's column directly above it.
            Tap either deck to see the cards it has left.</p>
            <p><b className="gold">Destruction:</b> placing a card destroys every card of the
            <b> same rank</b> in the dealer's opposing column — and the dealer
            can do the same to you.</p>
            <p><b className="gold">Scoring:</b> each column = sum of card values (J 11 · Q 12 · K 13 · A 14)
            × its 3-card poker multiplier:</p>
            <table>
              <tbody>
                {MULT_TABLE.map(([n, m]) => (
                  <tr key={n}><td>{n}</td><td>×{m}</td></tr>
                ))}
              </tbody>
            </table>
            <p>A-2-3 counts as a straight (ace still scores 14). When either
            board fills (or the deck runs out), the higher total takes the pot.
            <b className="gold"> You always draw first.</b> Wins pay 0.82:1 — the
            house keeps an 18% commission. Ties push.</p>
            <button className="dealbtn" onClick={() => setShowRules(false)}>GOT IT</button>
          </div>
        </div>
      )}

      {deckView && g && (
        <div className="overlay dim" onClick={() => setDeckView(null)}>
          <div className="panel deckbreak" onClick={e => e.stopPropagation()}>
            <h2>{deckView === "a" ? "DEALER'S" : "YOUR"} DECK</h2>
            <p className="bankline">{g.decks[deckView].length} CARDS REMAINING</p>
            <DeckBreakdown cards={g.decks[deckView]} />
            <button className="dealbtn" onClick={() => setDeckView(null)}>CLOSE</button>
          </div>
        </div>
      )}

      {/* Kill banners disabled for now. HAND BREAK is rendered over the defending
          column (see the dealer-half map) as a shattering hand callout instead.
      {killStreak && (
        <div className="callouts">
          <div className={"callout killstreak " + killStreak.toLowerCase()}>{killStreak} KILL!</div>
        </div>
      )} */}

      {celebrate && (
        <WinCelebration
          ret={celebrate.ret}
          profit={celebrate.profit}
          bank={bank}
          setBankValue={n => setBank(+n.toFixed(2))}
          bankRef={bankRef}
          onDone={finishCelebration}
        />
      )}
    </div>
  );
}

// Breakdown of cards still in a deck, one row per rank (high → low),
// showing which suits remain and a per-rank count.
function DeckBreakdown({ cards }) {
  const byRank = {};
  cards.forEach(c => { (byRank[c.r] = byRank[c.r] || []).push(c.s); });
  const ranks = [];
  for (let r = 14; r >= 2; r--) ranks.push(r);
  return (
    <div className="breakgrid">
      {ranks.map(r => {
        const have = byRank[r] || [];
        return (
          <div key={r} className="brow">
            <span className="brank">{rName(r)}</span>
            <span className="bsuits">
              {SUITS.map(s => (
                <span key={s} className={"bs" + (isRed(s) ? " red" : "") + (have.includes(s) ? "" : " gone")}>{s}</span>
              ))}
            </span>
            <span className="bcount">{have.length}</span>
          </div>
        );
      })}
    </div>
  );
}

// Rail label (owner + noun). Normally two stacked lines; `vertical` rotates it
// 90° into two side-by-side columns (used to the left of the total-score box).
function Label({ cls, owner, noun, vertical }) {
  return (
    <span className={"collabel " + cls + (vertical ? " vlabel" : "")}>
      <span className="lprefix">{owner}</span>
      <span className="lnoun">{noun}</span>
    </span>
  );
}

// Crown that floats above a leading total.
const CROWN = (
  <svg viewBox="0 0 28 20" className="crownsvg" aria-hidden="true">
    <path d="M2 18 L4 6 L9.5 12 L14 3 L18.5 12 L24 6 L26 18 Z"
      fill="url(#cg)" stroke="#7a5410" strokeWidth="1" strokeLinejoin="round" />
    <circle cx="4" cy="6" r="2" fill="#ffe89a" stroke="#7a5410" strokeWidth=".8" />
    <circle cx="14" cy="3" r="2.2" fill="#fff2c0" stroke="#7a5410" strokeWidth=".8" />
    <circle cx="24" cy="6" r="2" fill="#ffe89a" stroke="#7a5410" strokeWidth=".8" />
    <rect x="2" y="17" width="24" height="2.5" rx="1" fill="#e0a82e" />
    <defs>
      <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor="#ffe89a" /><stop offset="1" stopColor="#e0a82e" />
      </linearGradient>
    </defs>
  </svg>
);

// A leading total wears rotating sunrays behind the box and a floating crown.
function ScoreTotal({ side, total, winning }) {
  return (
    <div className="scorewrap">
      {winning && <span className="sunrays" aria-hidden="true" />}
      <div className={"scorebox " + side + (winning ? " winning" : "")}>
        <b>{total}</b>
      </div>
      {winning && <span className="crown">{CROWN}</span>}
    </div>
  );
}

// HAND BREAK: the defender's hand label pops up over its column, then the
// glass panel shatters into shards that scatter (with a glass-break SFX).
const HB_SHARDS = [
  { clip: "polygon(0 0, 56% 0, 50% 52%, 0 46%)",          x: -52, y: -34, r: -42 },
  { clip: "polygon(56% 0, 100% 0, 100% 42%, 50% 52%)",    x:  56, y: -28, r:  40 },
  { clip: "polygon(100% 42%, 100% 100%, 58% 100%, 50% 52%)", x: 60, y:  44, r:  50 },
  { clip: "polygon(58% 100%, 22% 100%, 50% 52%)",         x:   2, y:  64, r: -20 },
  { clip: "polygon(22% 100%, 0 100%, 0 46%, 50% 52%)",    x: -56, y:  40, r: -52 },
];
function HandBreakPop({ name, m, tier }) {
  const [shattered, setShattered] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => { setShattered(true); sGlassBreak(); }, 240);
    return () => clearTimeout(t);
  }, []);
  const txt = name + " ×" + m;
  // identical look to the normal hand callout (.handpop), just shattering
  const panel = "handpop hbpanel t" + (tier || 1);
  if (!shattered) {
    return <div className="hbpop"><div className={panel}>{txt}</div></div>;
  }
  return (
    <div className="hbpop shattered">
      <div className={panel + " sizer"} aria-hidden="true">{txt}</div>
      {HB_SHARDS.map((sh, i) => (
        <div key={i} className="hbshard"
          style={{ clipPath: sh.clip, "--sx": sh.x + "px", "--sy": sh.y + "px", "--sr": sh.r + "deg" }}>
          <div className={panel}>{txt}</div>
        </div>
      ))}
    </div>
  );
}

// A deck shown as a single real card-back with a remaining-count badge.
function DeckPile({ side, count, drew, deckRef, idkey, onClick }) {
  return (
    <div className={"deck " + side} onClick={onClick}>
      <Label cls={side === "a" ? "en" : "you"} owner={side === "a" ? "DEALER'S" : "YOUR"} noun="DECK" />
      <div ref={deckRef} className={"deckpile " + side + (drew ? " drew" : "")} key={idkey}>
        <i className="pcard top" />
        <span className="deckcount">{count}</span>
      </div>
    </div>
  );
}

// Settings menu, including a debug tool to override the player's draw card.
function SettingsPanel({ g, onSetDraw, onAddDealer, onClose }) {
  const canDraw = g && g.drawn && g.turn === "p";
  const [r, setR] = useState(14);
  const [s, setS] = useState("♠");
  const RANKS = [];
  for (let i = 14; i >= 2; i--) RANKS.push(i);
  return (
    <div className="overlay dim" onClick={onClose}>
      <div className="panel settings" onClick={e => e.stopPropagation()}>
        <h2>SETTINGS</h2>
        {g ? (
          <React.Fragment>
            <div className="setsec">
              <h3>DEBUG · PICK A CARD</h3>
              <div className="rankgrid">
                {RANKS.map(rr => (
                  <button key={rr} className={"rkbtn" + (r === rr ? " on" : "")} onClick={() => setR(rr)}>{rName(rr)}</button>
                ))}
              </div>
              <div className="suitrow">
                {SUITS.map(ss => (
                  <button key={ss} className={"stbtn" + (isRed(ss) ? " red" : "") + (s === ss ? " on" : "")} onClick={() => setS(ss)}>{ss}</button>
                ))}
              </div>
              <p className="setnote">Selected: <b className="gold">{rName(r)}{s}</b></p>
            </div>
            <div className="setsec">
              <h3>ADD TO DEALER GRID</h3>
              <p className="setnote">Drop {rName(r)}{s} into a dealer column:</p>
              <div className="suitrow">
                {COL_LETTERS.map((L, c) => (
                  <button key={c} className="rkbtn wide" disabled={g.boards.a[c].length >= 3}
                    onClick={() => onAddDealer(r, s, c)}>{L}</button>
                ))}
              </div>
            </div>
            <div className="setsec">
              <h3>OVERRIDE MY DRAW</h3>
              <button className="dealbtn" disabled={!canDraw}
                onClick={() => { onSetDraw(r, s); onClose(); }}>SET DRAW → {rName(r)}{s}</button>
              {!canDraw && <p className="setnote">Available on your turn, once a card is drawn.</p>}
            </div>
          </React.Fragment>
        ) : (
          <p className="setnote">Start a round to use the debug tools.</p>
        )}
        <button className="ruleslink" onClick={onClose}>CLOSE</button>
      </div>
    </div>
  );

// Drawn card: slides face-down from the deck pile to the draw slot,
// then flips over. Flight vector is measured at mount so it stays
// correct across screen sizes.
function DrawnCard({ c, deckRef, side }) {
  const ref = useRef(null);
  const [go, setGo] = useState(false);
  React.useLayoutEffect(() => {
    const el = ref.current, dk = deckRef.current;
    let flyMs = 420;
    if (el && dk) {
      const d = dk.getBoundingClientRect(), s = el.getBoundingClientRect();
      const dx = d.left + d.width / 2 - s.left - s.width / 2;
      const dy = d.top + d.height / 2 - s.top - s.height / 2;
      el.style.setProperty("--dx", dx + "px");
      el.style.setProperty("--dy", dy + "px");
      flyMs = Math.round(Math.min(750, Math.max(400, Math.hypot(dx, dy) * 1.1)));
      el.style.setProperty("--flyms", flyMs + "ms");
      el.style.setProperty("--flipdel", (flyMs + 60) + "ms");
    }
    setGo(true);
    sDraw();
    const t = setTimeout(sFlip, flyMs + 250);
    return () => clearTimeout(t);
  }, []);
  return (
    <div ref={ref} className={"drawfly" + (go ? " go" : "")}>
      <div className="flipinner">
        <div className={"face back " + (side === "a" ? "en" : "you")} />
        <div className={"face front" + (isRed(c.s) ? " red" : "")}>
          <span className="cr">{rName(c.r)}</span>
          <span className="cs">{c.s}</span>
        </div>
      </div>
    </div>
  );
}

function CardV({ c, dying, flyFrom, role, phase, pulsing }) {
  const ref = useRef(null);
  // FLIP: a freshly-placed card mounts at its final slot, then we invert it back
  // to the draw-slot position and slide it in at a CONSTANT size (translate only,
  // no scaling). The placement "thunk" bounce is driven separately (see `pulsing`)
  // so it can be queued until after an attack resolves.
  React.useLayoutEffect(() => {
    const el = ref.current;
    if (!flyFrom || !el) return;
    const to = el.getBoundingClientRect();
    if (!to.width) return;
    const dx = (flyFrom.left + flyFrom.width / 2) - (to.left + to.width / 2);
    const dy = (flyFrom.top + flyFrom.height / 2) - (to.top + to.height / 2);
    el.style.animation = "none";
    el.style.transition = "none";
    el.style.transform = `translate(${dx}px, ${dy}px)`;
    el.style.zIndex = "7";
    void el.getBoundingClientRect();
    requestAnimationFrame(() => {
      el.style.transition = "transform .28s cubic-bezier(.3,.7,.25,1)";
      el.style.transform = "translate(0, 0)";
      const done = () => {
        el.removeEventListener("transitionend", done);
        el.style.transition = "";
        el.style.transform = "";
        el.style.zIndex = "";
        // hold inline animation at "none" so the base `pop` can't replay; the
        // slam bounce and attack states use !important to take over.
        el.style.animation = "none";
      };
      el.addEventListener("transitionend", done);
    });
  }, []);
  const cls = "cardv" + (isRed(c.s) ? " red" : "") + (dying ? " dying" : "")
    + (pulsing ? " slam" : "")
    + (role ? " atk-" + role : "") + (role && phase ? " ph-" + phase : "");
  const idx = <span className="cr">{rName(c.r)}</span>;
  const suit = <span className="cs">{c.s}</span>;
  const ripping = role === "victim" && phase === "rip";
  return (
    <div ref={ref} className={cls}>
      {idx}{suit}
      {ripping && (
        <React.Fragment>
          <span className="riphalf top">{idx}{suit}</span>
          <span className="riphalf bot">{idx}{suit}</span>
        </React.Fragment>
      )}
      {/* Fire VFX disabled for now — attacks use the rip only.
      {role === "victim" && (phase === "burn" || phase === "rip") &&
        <span className="fx fx-burn" style={{ backgroundImage: "url(" + FIRE_BURST + ")" }} />}
      */}
    </div>
  );
}

// ─── WIN CELEBRATION ─────────────────────────────────────
// Plays OVER the board: a "YOU WIN" burst with money/gold confetti exploding
// outward, then a stream of golden coins drains from centre into the bank
// counter while the balance ticks up. Calls onDone when finished.
const CONFETTI_EMOJI = ["💰", "🪙", "💵", "✨", "🤑", "💸"];
function WinCelebration({ ret, profit, bank, setBankValue, bankRef, onDone }) {
  const startBank = useRef(bank);
  const [coins, setCoins] = useState([]);
  const [drained, setDrained] = useState(false);
  const doneRef = useRef(onDone);
  doneRef.current = onDone;

  // confetti particles, fixed set computed once
  const confetti = React.useMemo(() => {
    const out = [];
    for (let i = 0; i < 46; i++) {
      const ang = (Math.PI * 2 * i) / 46 + (i % 3) * 0.4;
      const dist = 120 + (i % 7) * 46;
      out.push({
        i,
        e: CONFETTI_EMOJI[i % CONFETTI_EMOJI.length],
        tx: Math.cos(ang) * dist,
        ty: Math.sin(ang) * dist - 60,
        rot: (i % 2 ? 1 : -1) * (180 + (i % 5) * 90),
        delay: (i % 6) * 30,
        size: 22 + (i % 4) * 9,
      });
    }
    return out;
  }, []);

  useEffect(() => {
    sWin();
    const N = 12;            // coins in the stream
    const FLIGHT = 340;      // ms each coin flies (matches the coindrain animation)
    const GAP = 170;         // ms between coin launches → one clink as each lands
    const START = 2050;      // begin after the explosion settles
    const from = startBank.current, to = +(from + ret).toFixed(2);
    const timers = [];
    const launch = setTimeout(() => {
      setDrained(true);
      const dk = bankRef.current ? bankRef.current.getBoundingClientRect() : null;
      const dest = dk
        ? { x: dk.left + dk.width / 2, y: dk.top + dk.height / 2 }
        : { x: window.innerWidth - 40, y: 30 };
      const dx = dest.x - window.innerWidth / 2, dy = dest.y - window.innerHeight / 2;
      // emit single chips one at a time; each plays a coin clink + ticks the
      // balance the moment it reaches the counter.
      for (let i = 0; i < N; i++) {
        timers.push(setTimeout(() => {
          const jx = (i % 2 ? 1 : -1) * (14 + (i % 5) * 12);
          setCoins(cs => [...cs, { id: i, dx, dy, jx }]);
          timers.push(setTimeout(() => {
            sCoin();
            setBankValue(i === N - 1 ? to : +(from + (to - from) * (i + 1) / N).toFixed(2));
            setCoins(cs => cs.filter(c => c.id !== i));
          }, FLIGHT));
        }, i * GAP));
      }
    }, START);
    const t2 = setTimeout(() => doneRef.current(), START + N * GAP + FLIGHT + 560);
    return () => { clearTimeout(launch); clearTimeout(t2); timers.forEach(clearTimeout); };
  }, []);

  return (
    <div className="celebrate">
      <div className="confetti">
        {confetti.map(p => (
          <span key={p.i} className="conf"
            style={{ "--tx": p.tx + "px", "--ty": p.ty + "px", "--rot": p.rot + "deg",
                     animationDelay: p.delay + "ms", fontSize: p.size + "px" }}>{p.e}</span>
        ))}
      </div>
      <div className="winburst">
        <div className="winbg" />
        <div className="winbig">YOU WIN</div>
        <div className="winamt">+{fmt(profit)}</div>
        <div className={"winpay" + (drained ? " sent" : "")}>PAYOUT {fmt(ret)}</div>
      </div>
      <div className="coinstream">
        {coins.map(c => (
          <img key={c.id} className="coin" src={CHIP_ICON} alt=""
            style={{ "--cx": c.dx + "px", "--cy": c.dy + "px", "--jx": c.jx + "px" }} />
        ))}
      </div>
    </div>
  );
}

  width: clamp(30px,8vw,48px);
  margin-bottom: -2px;
  pointer-events: none;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,.55));
  animation: crownbob 1.8s ease-in-out infinite;
}
.crown .crownsvg { width: 100%; height: auto; display: block; }
@keyframes crownbob {
  0%,100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
  50%     { transform: translateX(-50%) translateY(-4px) rotate(2deg); }
}
/* On height-constrained (landscape/desktop) layouts the board is sized by
   dvh while the crown's 8vw width saturates to its max — oversizing it so it
   pokes up into the deck pile + count badge that sit right above the player
   score. Tame the width (no longer vw-driven) and tuck the crown onto the
   box top so it clears the badge. Phone-portrait keeps the floating crown. */
@media (min-aspect-ratio: 2/3) {
  .crown {
    width: clamp(22px, 3.6vw, 30px);
    margin-bottom: calc(var(--scoreh) * -0.16);
  }
}

/* ─── COLUMN SCORES ─── */
.colscore {
  align-self: center;
  height: var(--scoreh);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  border-radius: 10px;
  padding: 0 2px;
  border-bottom: 3px solid var(--gold-dim);
  line-height: 1;
}
.colscore.en  { background: var(--en-panel); }
.colscore.you { background: var(--you-panel); }
.colscore b { display: block; font-family: var(--cf); font-weight: 700; font-size: clamp(22px,5.6vw,32px); color: var(--text); }
.colscore span { display: block; font-family: var(--cf); font-weight: 700; font-size: clamp(11px,3vw,16px); letter-spacing: .4px; color: var(--gold); margin-top: 1px; }
.colscore.lead { border-bottom-color: var(--gold); box-shadow: 0 0 14px rgba(244,198,76,.35); }
/* dark halo (not gold-on-gold) keeps the gold number crisp */
.colscore.lead b { color: var(--gold); text-shadow: 0 0 4px rgba(0,0,0,.85), 0 1px 2px rgba(0,0,0,.9); }

.colmid {
  text-align: center;
  font-family: var(--cf); font-weight: 700;
  font-size: clamp(13px,3.4vw,18px);
  letter-spacing: 1px;
  color: var(--muted);
  line-height: 1;
}

.half {
  position: relative;
  width: 100%;
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(2px,0.7dvh,7px);
  padding: clamp(2px,0.6dvh,6px);
  border-radius: 13px;
  border: 2px solid;
  transition: border-color .15s, background .15s, box-shadow .2s;
}
.half.dealer { background: rgba(90,34,28,.36); border-color: var(--en-line); }
.half.mine   { background: rgba(23,58,92,.38); border-color: var(--you-line); }
.half.mine.tappable {
  border-color: var(--gold);
  background: rgba(47,116,171,.46);
  cursor: pointer;
  animation: colpulse 1.2s ease-in-out infinite;
}
/* destruction flash — legible on each board's own colour: gold burst when you
   smash the dealer's RED board, red alarm when the dealer smashes your blue one */
.half.dealer.hit { background: rgba(255,226,140,.6); border-color: #fff; box-shadow: 0 0 24px rgba(255,226,140,.75); }
.half.mine.hit   { background: rgba(224,60,50,.5);  border-color: #ff6f62; box-shadow: 0 0 22px rgba(224,60,50,.55); }
@keyframes colpulse {
  0%, 100% { border-color: rgba(244,198,76,.95); }
  50%      { border-color: rgba(244,198,76,.4); }
}

/* hand-formed glow + banner, escalating by tier */
.half.glow.t1 { border-color: var(--gold); box-shadow: 0 0 12px rgba(244,198,76,.5); }
.half.glow.t2 { border-color: var(--gold); box-shadow: 0 0 18px rgba(244,198,76,.7); }
.half.glow.t3 { border-color: #ffd97a; box-shadow: 0 0 24px rgba(255,217,122,.9); }
.half.glow.t4 { border-color: #ffe9b0; box-shadow: 0 0 32px rgba(255,233,176,.97); }
.half.glow.t5 { border-color: #fff; box-shadow: 0 0 40px rgba(255,255,255,.97), 0 0 70px rgba(244,198,76,.85); }

.half .slot, .half .cardv { width: var(--cardw); height: var(--cardh); }
.slot { border: 2px dashed; border-radius: 9px; }
.half.dealer .slot { border-color: rgba(228,113,95,.5); background: rgba(90,34,28,.3); }
.half.mine   .slot { border-color: rgba(90,166,224,.5); background: rgba(23,58,92,.3); }

.handpop {
  position: absolute;
  left: 50%; top: 50%; z-index: 6;
  font-family: var(--cf);
  font-weight: 700; letter-spacing: 1.5px;
  font-size: clamp(26px,6.8vw,38px);
  color: var(--gold);
  background: rgba(10,13,11,.92);
  border: 2px solid var(--gold);
  border-radius: 10px;
  padding: 8px 20px;
  white-space: nowrap; pointer-events: none;
  animation: handpop 1.45s ease-out forwards;
}
.handpop.t3 { color: #ffd97a; border-color: #ffd97a; }
.handpop.t4 { color: #ffe9b0; border-color: #ffe9b0; box-shadow: 0 0 18px rgba(255,233,176,.6); font-size: clamp(30px,8vw,44px); }
.handpop.t5 { color: #fff; border-color: #fff; box-shadow: 0 0 26px rgba(255,255,255,.8); font-size: clamp(34px,9.2vw,50px); }
@keyframes handpop {
  0%   { transform: translate(-50%, -30%) scale(.4); opacity: 0; }
  16%  { transform: translate(-50%, -50%) scale(1.18); opacity: 1; }
  28%  { transform: translate(-50%, -50%) scale(1); }
  78%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -85%) scale(1); opacity: 0; }
}

/* ─── HAND BREAK: the defender's hand label (identical to .handpop) shatters ─── */
.hbpop { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 8; pointer-events: none; }
/* hbpanel keeps the full .handpop look (incl. tier colours) — just neutralise
   its absolute positioning + float-up animation so it sits inside the shards. */
.hbpanel { position: static; left: auto; top: auto; z-index: auto; transform: none; animation: none; }
.hbpop:not(.shattered) { animation: hbshow .24s cubic-bezier(.3,1.4,.5,1) both; }
@keyframes hbshow {
  0%   { transform: translate(-50%, -50%) scale(.3); opacity: 0; }
  70%  { opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
/* shatter: each shard is a clipped copy of the panel that flies off + spins */
.hbpop.shattered .sizer { visibility: hidden; }
.hbshard { position: absolute; inset: 0; animation: hbshatter .5s ease-in forwards; }
.hbshard .hbpanel { width: 100%; height: 100%; }
@keyframes hbshatter {
  0%   { transform: translate(0,0) rotate(0) scale(1); opacity: 1; }
  15%  { opacity: 1; }
  100% { transform: translate(var(--sx), var(--sy)) rotate(var(--sr)) scale(.82); opacity: 0; }
}

.app.shake { animation: shake .5s ease-out; }
@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-4px, 2px); }
  40% { transform: translate(4px, -2px); }
  60% { transform: translate(-3px, -2px); }
  80% { transform: translate(3px, 1px); }
}

/* attack screen shake — intensity scales with the number of cards destroyed */
.board.atkshake.a1 { animation: scrshake1 .32s ease-out; }
.board.atkshake.a2 { animation: scrshake2 .38s ease-out; }
.board.atkshake.a3 { animation: scrshake3 .44s ease-out; }
@keyframes scrshake1 {
  0%,100% { transform: translate(0,0); }
  25% { transform: translate(-2px,1px); } 50% { transform: translate(2px,-1px); } 75% { transform: translate(-1px,1px); }
}
@keyframes scrshake2 {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-5px,2px); } 40% { transform: translate(5px,-2px); }
  60% { transform: translate(-4px,-1px); } 80% { transform: translate(4px,2px); }
}
@keyframes scrshake3 {
  0%,100% { transform: translate(0,0); }
  15% { transform: translate(-9px,3px) rotate(-.5deg); } 30% { transform: translate(9px,-3px) rotate(.5deg); }
  45% { transform: translate(-7px,-2px); } 60% { transform: translate(7px,2px) rotate(.4deg); } 80% { transform: translate(-4px,1px); }
}

/* callout banners — full-width tilted flashes, each on screen <0.5s. They
   STACK vertically when more than one fires at once (e.g. HAND BREAK + KILL). */
.callouts {
  position: fixed; left: 0; right: 0; top: 30%;
  z-index: 30; pointer-events: none;
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(8px,2.2dvh,24px);
}
.callout {
  width: 124%;
  text-align: center;
  font-family: var(--cf); font-weight: 700;
  font-size: clamp(34px, 11vw, 92px);
  letter-spacing: clamp(3px,1.1vw,7px);
  color: #fff;
  transform: rotate(-7deg);
  padding: clamp(6px,1.6dvh,16px) 0;
  animation: calloutpop .47s ease-out forwards;
}
.callout.killstreak {
  background: linear-gradient(90deg, transparent, rgba(190,34,26,.94) 14%, rgba(255,120,38,.96) 50%, rgba(190,34,26,.94) 86%, transparent);
  text-shadow: 0 0 20px rgba(255,90,40,.95), 0 4px 0 rgba(0,0,0,.55);
}
.callout.killstreak.triple {
  color: #ffe49a;
  background: linear-gradient(90deg, transparent, rgba(150,28,20,.95) 14%, rgba(255,170,40,.97) 50%, rgba(150,28,20,.95) 86%, transparent);
  text-shadow: 0 0 26px rgba(255,200,60,1), 0 4px 0 rgba(0,0,0,.55);
}
/* HAND BREAK — icy shattered-glass blue */
.callout.handbreak {
  color: #eaf6ff;
  background: linear-gradient(90deg, transparent, rgba(38,86,150,.94) 14%, rgba(96,184,240,.96) 50%, rgba(38,86,150,.94) 86%, transparent);
  text-shadow: 0 0 20px rgba(150,215,255,.95), 0 4px 0 rgba(0,0,0,.55);
}
@keyframes calloutpop {
  0%   { opacity: 0; transform: rotate(-7deg) scale(.55); }
  22%  { opacity: 1; transform: rotate(-7deg) scale(1.1); }
  68%  { opacity: 1; transform: rotate(-7deg) scale(1); }
  100% { opacity: 0; transform: rotate(-7deg) scale(1.03); }
}

/* ─── CARDS ─── */
.cardv {
  position: relative;
  container-type: size;                 /* rank/suit scale to the actual card size */
  background: var(--card);
  border-radius: clamp(5px,1.4vw,10px);
  color: #181818;
  box-shadow: 0 3px 7px rgba(0,0,0,.5);
  overflow: hidden;
  animation: pop .22s ease-out;
}
.cardv.red, .face.front.red { color: var(--redsuit); }
/* rank pinned top-left, suit pinned bottom-right */
.cardv .cr {
  position: absolute; top: 2%; left: 9%;
  font-family: var(--cf); font-weight: 700; line-height: .85;
  font-size: 66cqmin;
}
.cardv .cs {
  position: absolute; bottom: 7%; right: 9%;
  line-height: .8;
  font-size: 74cqmin;
}
.cardv.dying { animation: smash .55s ease-in forwards; }
@keyframes pop {
  from { transform: scale(.4); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes landpulse {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.13); }
  100% { transform: scale(1); }
}
/* placement "thunk" bounce — !important overrides the held inline animation */
.cardv.slam { animation: landpulse .26s ease-out !important; }
@keyframes smash {
  0%   { transform: scale(1) rotate(0); filter: none; }
  30%  { transform: scale(1.12) rotate(-7deg); filter: sepia(1) saturate(4) hue-rotate(-40deg); }
  100% { transform: scale(0) rotate(18deg); opacity: 0; filter: sepia(1) saturate(4) hue-rotate(-40deg); }
}

/* ─── ATTACK / DESTRUCTION SEQUENCE (pack VFX + SFX) ─── */
/* only uninvolved bystanders dim — attacker and victims stay full brightness */
.cardv.atk-bystander { filter: brightness(.4) saturate(.7); transition: filter .3s; }
/* attacker: glows + shakes (NO enlargement). !important beats the lingering
   inline placement animation so the shake always plays and never scales up. */
.cardv.atk-attacker {
  z-index: 9; overflow: visible;
  box-shadow: 0 0 20px 5px rgba(255,215,100,.9), 0 0 42px rgba(255,160,50,.7);
  animation: atkshakeglow .08s steps(2) infinite !important;
}
@keyframes atkshakeglow {
  0%   { transform: translate(-1.8px, 1.2px); filter: brightness(1.28); }
  100% { transform: translate(1.8px, -1.2px); filter: brightness(1.12); }
}
/* victims: stay lit, then tear in half */
.cardv.atk-victim { z-index: 8; overflow: visible; }
/* fire tint disabled for now — attacks use the rip only:
.cardv.atk-victim.ph-burn   { filter: saturate(1.5) brightness(1.06); transition: filter .2s; } */
.cardv.atk-victim.ph-rip    { background: transparent; box-shadow: none; }
.cardv.atk-victim.ph-rip > .cr, .cardv.atk-victim.ph-rip > .cs { display: none; }

/* single-shot pack fire sprite, drawn larger than the card */
.fx { position: absolute; inset: -35%; z-index: 10; pointer-events: none; background-repeat: no-repeat; background-position: 0 0; }
.fx-burn   { inset: -55%; background-size: 1200% 100%; animation: spr12 .5s steps(12) 1 forwards; }
@keyframes spr12 { from { background-position-x: 0%; } to { background-position-x: 109.0909%; } }

/* RIP IN HALF: two diagonal halves fly apart and fade */
.riphalf { position: absolute; inset: 0; z-index: 6; background: var(--card); border-radius: inherit; overflow: hidden; color: #181818; }
.cardv.red .riphalf { color: var(--redsuit); }
.riphalf .cr { position: absolute; top: 2%; left: 9%; font-family: var(--cf); font-weight: 700; line-height: .85; font-size: 66cqmin; }
.riphalf .cs { position: absolute; bottom: 7%; right: 9%; line-height: .8; font-size: 74cqmin; }
.riphalf.top { clip-path: polygon(0 0, 100% 0, 100% 100%); animation: rip-top .42s ease-in forwards; }
.riphalf.bot { clip-path: polygon(0 0, 0 100%, 100% 100%); animation: rip-bot .42s ease-in forwards; }
@keyframes rip-top { 0% { transform: translate(0,0) rotate(0); } 100% { transform: translate(48%,-66%) rotate(28deg); opacity: 0; } }
@keyframes rip-bot { 0% { transform: translate(0,0) rotate(0); } 100% { transform: translate(-48%,66%) rotate(-28deg); opacity: 0; } }

/* ─── DRAW FLIGHT & FLIP ─── */
.drawfly {
  width: var(--draww); height: var(--drawh);
  position: relative; perspective: 800px;
  opacity: 0; z-index: 5;
}
.drawfly.go { opacity: 1; animation: fly var(--flyms, .42s) cubic-bezier(.25,.8,.35,1) both; }
@keyframes fly {
  from { transform: translate(var(--dx,-56px), var(--dy,0px)) rotate(-12deg); }
  70%  { transform: translate(2px,-3px) rotate(3deg); }
  to   { transform: translate(0,0) rotate(0deg); }
}
.flipinner {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  animation: flipover .45s ease-in-out var(--flipdel,.4s) both;
}
@keyframes flipover {
  from { transform: rotateY(180deg); }
  55%  { transform: rotateY(90deg) translateY(-9px) scale(1.1); }
  to   { transform: rotateY(0deg) translateY(0) scale(1); }
}
.face {
  position: absolute; inset: 0;
  border-radius: 9px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  box-shadow: 0 3px 7px rgba(0, 0, 0, .5);
}
.face.front { background: var(--card); color: #181818; overflow: hidden; }
.face.front.red { color: var(--redsuit); }
/* match the COLUMN cards exactly: .cardv uses 66cqmin / 74cqmin of card width
   (= drawh*0.72), so mirror those sizes + positions on the draw card's face. */
.face.front .cr { position: absolute; top: 2%; left: 9%; font-family: var(--cf); font-weight: 700; line-height: .85; font-size: calc(var(--drawh) * 0.4752); }
.face.front .cs { position: absolute; bottom: 7%; right: 9%; line-height: .8; font-size: calc(var(--drawh) * 0.5328); }
.face.back {
  transform: rotateY(180deg);
  background-image: var(--card-back);
  background-size: cover; background-position: center; background-repeat: no-repeat;
  background-color: #14304a;
  box-shadow: 0 3px 7px rgba(0,0,0,.5);
}

/* ─── OVERLAYS ─── */
.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(5, 22, 18, .84);
  z-index: 10;
  padding: 16px;
}
.overlay.dim { backdrop-filter: blur(2px); }

.panel {
  width: 100%;
  max-width: 380px;
  background: linear-gradient(180deg, #18403a, #0f2e29);
  border: 2px solid #2c6256;
  border-radius: 18px;
  padding: clamp(20px,5vw,30px) clamp(18px,5vw,26px);
  text-align: center;
  box-shadow: 0 18px 50px rgba(0,0,0,.5);
}
.panel h1 {
  font-family: var(--cf);
  font-size: clamp(34px,9vw,52px);
  letter-spacing: 3px;
  margin: 0;
}
.panel h2 {
  font-family: var(--cf);
  font-size: clamp(26px,7vw,38px);
  letter-spacing: 2px;
  margin: 0 0 12px;
}
.tag { color: var(--muted); font-size: clamp(13px,3.6vw,17px); margin: 8px 0 18px; }
.bankline {
  font-family: var(--cf);
  letter-spacing: 1.5px;
  font-size: clamp(14px,3.8vw,18px);
  color: var(--muted);
  margin-bottom: 14px;
}
.bankline b { color: var(--gold); font-size: clamp(20px,5vw,26px); margin-left: 6px; }

/* bet slip: STAKE → PAYOUT */
.slip {
  display: flex; align-items: stretch; justify-content: center;
  gap: clamp(6px,2.5vw,12px);
  margin: 8px 0 10px;
}
.slipcol {
  flex: 1 1 0; max-width: 160px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  padding: clamp(8px,2.4vw,14px) 6px;
  border-radius: 13px;
  background: rgba(0,0,0,.26);
  border: 1.5px solid #2c6256;
}
.slipcol span { font-family: var(--cf); font-weight: 700; font-size: clamp(12px,3.3vw,17px); letter-spacing: 1px; color: var(--muted); }
.slipcol b { font-family: var(--cf); font-weight: 700; font-size: clamp(28px,8.5vw,50px); line-height: 1; color: var(--text); }
.slipcol.win { background: linear-gradient(180deg, rgba(244,198,76,.28), rgba(184,138,46,.08)); border-color: var(--gold); box-shadow: 0 0 18px rgba(244,198,76,.3); }
.slipcol.win span { color: var(--gold-soft); }
.slipcol.win b { color: var(--gold); text-shadow: 0 0 18px rgba(244,198,76,.6); }
.sliparrow { align-self: center; font-size: clamp(22px,6vw,34px); color: var(--gold); }
.winchance {
  font-family: var(--cf); font-weight: 700;
  font-size: clamp(13px,3.6vw,18px); letter-spacing: 1px;
  color: var(--muted); margin-bottom: 14px;
}
.winchance b { color: #6fe39a; margin: 0 3px; }
.chips {
  display: flex;
  justify-content: center;
  gap: clamp(7px,2.4vw,12px);
  margin-bottom: 18px;
}
.clearchip { border-style: solid !important; border-color: #2c6256 !important; color: var(--muted) !important; }
.chip {
  width: clamp(58px,16vw,76px); aspect-ratio: 1;
  border-radius: 50%;
  border: 3px dashed var(--gold);
  background: radial-gradient(circle at 35% 30%, #2c6256, #16332d);
  color: var(--gold);
  font-family: var(--cf);
  font-weight: 700;
  font-size: clamp(18px,5vw,24px);
}
.chip:disabled { opacity: .3; }

.dealbtn {
  display: block;
  width: 100%;
  padding: clamp(13px,3.4vw,18px);
  border: none;
  border-radius: 11px;
  background: linear-gradient(180deg, #ffd668, #e8a838);
  color: #2a1c05;
  font-family: var(--cf);
  font-weight: 700;
  font-size: clamp(19px,5.2vw,26px);
  letter-spacing: 2px;
  margin-top: 4px;
  box-shadow: 0 4px 0 #a8721f;
}
.dealbtn:disabled { opacity: .4; box-shadow: 0 4px 0 #5a4318; }
.dealbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a8721f; }

.fine { color: var(--muted); font-size: clamp(11px,3vw,14px); margin: 12px 0 0; }
.broke { color: var(--redsuit); font-weight: 700; font-size: clamp(15px,4vw,19px); margin: 16px 0; }
.ruleslink {
  background: none;
  border: none;
  color: var(--muted);
  font-size: clamp(12px,3.2vw,15px);
  letter-spacing: 1.5px;
  margin-top: 16px;
  text-decoration: underline;
}

.result h2 { font-size: clamp(32px,8.5vw,46px); }
.result.win h2 { color: var(--gold); }
.result.lose h2 { color: var(--redsuit); }
.totals {
  display: flex;
  justify-content: center;
  gap: 14px;
  font-family: var(--cf);
  font-size: clamp(16px,4.4vw,21px);
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
}
.totals b { color: var(--text); font-size: clamp(20px,5.4vw,27px); margin-left: 5px; }
.totals .vs { align-self: center; font-size: clamp(12px,3.2vw,15px); }
.profit {
  font-family: var(--cf);
  font-weight: 700;
  font-size: clamp(30px,8vw,42px);
  margin-bottom: 16px;
}
.result.win .profit { color: var(--gold); }
.result.lose .profit { color: var(--redsuit); }

.rules { text-align: left; max-height: 86dvh; overflow-y: auto; }
.rules h2 { text-align: center; }
.rules p { font-size: clamp(13px,3.6vw,16px); line-height: 1.55; color: #d3ddd6; margin: 0 0 11px; }
.rules .gold { color: var(--gold); }
.rules table {
  width: 100%;
  font-size: clamp(13px,3.6vw,16px);
  border-collapse: collapse;
  margin: 4px 0 12px;
}
.rules td { padding: 4px 6px; border-bottom: 1px solid #224039; }
.rules td:last-child { text-align: right; color: var(--gold); font-weight: 700; }

/* ─── SETTINGS / DEBUG ─── */
.gear { font-size: clamp(17px,4.4vw,23px); }
.settings { text-align: center; max-height: 88dvh; overflow-y: auto; }
.setsec + .setsec { margin-top: 0; }
.setsec { margin: 6px 0 14px; padding: 14px; border: 1px solid #2c6256; border-radius: 14px; background: rgba(0,0,0,.22); }
.setsec h3 { font-family: var(--cf); letter-spacing: 1px; font-size: clamp(14px,3.8vw,18px); color: var(--gold-soft); margin: 0 0 8px; }
.setnote { color: var(--muted); font-size: clamp(12px,3.3vw,15px); margin: 0 0 12px; }
.rankgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 10px; }
.rkbtn {
  font-family: var(--cf); font-weight: 700; font-size: clamp(14px,3.8vw,19px);
  padding: 8px 0; border-radius: 8px; color: var(--text);
  background: rgba(255,255,255,.06); border: 1.5px solid #2c6256;
}
.rkbtn.on { background: var(--gold); color: #1a1408; border-color: var(--gold-soft); }
.rkbtn.wide { flex: 1 1 0; max-width: 90px; padding: 12px 0; font-size: clamp(18px,5vw,24px); }
.rkbtn:disabled { opacity: .35; }
.suitrow { display: flex; justify-content: center; gap: 10px; margin-bottom: 14px; }
.stbtn {
  width: clamp(44px,12vw,58px); aspect-ratio: 1; font-size: clamp(22px,6vw,30px);
  border-radius: 10px; color: #1a1408; background: var(--card);
  border: 2px solid #2c6256;
}
.stbtn.red { color: var(--redsuit); }
.stbtn.on { border-color: var(--gold); box-shadow: 0 0 12px rgba(244,198,76,.55); transform: translateY(-1px); }

/* ─── DECK BREAKDOWN ─── */
.deckbreak { max-height: 88dvh; overflow-y: auto; }
.deckbreak .bankline { margin-bottom: 14px; }
.breakgrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px 16px;
  margin-bottom: 16px;
}
.brow {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 4px;
  border-bottom: 1px solid #224039;
}
.brank {
  font-family: var(--cf);
  font-weight: 700;
  font-size: clamp(15px,4vw,19px);
  width: 20px;
  text-align: center;
  color: var(--text);
}
.bsuits { display: flex; gap: 4px; flex: 1; }
.bs { font-size: clamp(14px,3.8vw,18px); color: #d3ddd6; }
.bs.red { color: var(--redsuit); }
.bs.gone { opacity: .16; }
.bcount {
  font-family: var(--cf);
  font-weight: 700;
  font-size: clamp(13px,3.5vw,16px);
  color: var(--gold);
  width: 16px;
  text-align: right;
}

/* ─── WIN CELEBRATION (plays over the board) ─── */
.celebrate { position: fixed; inset: 0; z-index: 20; pointer-events: none; overflow: hidden; }
.confetti, .coinstream { position: absolute; inset: 0; }
.conf {
  position: absolute; left: 50%; top: 46%;
  transform: translate(-50%,-50%) scale(.2);
  opacity: 0;
  will-change: transform, opacity;
  animation: confburst 3.2s cubic-bezier(.12,.7,.35,1) forwards;   /* explosion lasts 2x longer */
}
@keyframes confburst {
  0%   { transform: translate(-50%,-50%) scale(.2) rotate(0deg); opacity: 0; }
  8%   { opacity: 1; }
  85%  { opacity: 1; }
  100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.15) rotate(var(--rot)); opacity: 0; }
}
.winburst { position: absolute; left: 50%; top: 42%; transform: translate(-50%,-50%); text-align: center; width: 100%; }
/* radial backdrop so the text reads against the busy board */
.winbg {
  position: absolute; left: 50%; top: 46%; z-index: -1;
  width: min(150vw, 900px); aspect-ratio: 1; transform: translate(-50%,-50%);
  border-radius: 50%; pointer-events: none;
  background: radial-gradient(closest-side, rgba(0,0,0,.95), rgba(0,0,0,.78) 45%, rgba(0,0,0,0) 72%);
  animation: winbgpop .5s both;
}
/* dedicated keyframes that KEEP the centering translate — the shared winpop
   animates `transform`, which would otherwise clobber translate(-50%,-50%)
   and shove the backdrop off to the lower-right of the text. */
@keyframes winbgpop {
  from { transform: translate(-50%,-50%) scale(.3); opacity: 0; }
  to   { transform: translate(-50%,-50%) scale(1);  opacity: 1; }
}
.winbig {
  font-family: var(--cf); font-weight: 700;
  font-size: clamp(54px,17vw,150px); letter-spacing: 2px; line-height: .9;
  color: #fff;
  text-shadow: 0 0 26px var(--gold), 0 5px 0 #a8721f, 0 0 70px rgba(244,198,76,.85);
  animation: winpop .6s cubic-bezier(.2,1.5,.4,1) both;
}
.winamt {
  font-family: var(--cf); font-weight: 700;
  font-size: clamp(34px,10vw,80px); line-height: 1;
  color: var(--gold);
  text-shadow: 0 0 22px rgba(244,198,76,.8);
  animation: winpop .6s .12s cubic-bezier(.2,1.5,.4,1) both;
}
.winpay {
  font-family: var(--cf); font-weight: 700;
  font-size: clamp(16px,4.6vw,28px); letter-spacing: 1px; margin-top: 6px;
  color: var(--gold-soft);
  animation: winpop .6s .22s both;
  transition: opacity .5s;
}
.winpay.sent { opacity: .45; }
@keyframes winpop { from { transform: scale(.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.coin {
  position: absolute; left: 50%; top: 50%;
  width: clamp(30px,7vw,54px); height: auto;
  opacity: 0;
  will-change: transform, opacity;
  animation: coindrain .34s ease-in forwards;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
}
@keyframes coindrain {
  0%   { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  18%  { transform: translate(calc(-50% + var(--jx)), -75%) scale(1.15); opacity: 1; }
  100% { transform: translate(calc(-50% + var(--cx)), calc(-50% + var(--cy))) scale(.35); opacity: 0; }
}
</style>
</body>
</html>
